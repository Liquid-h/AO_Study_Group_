name: Daily News Bot

# 언제 실행할지 설정 (매일 한국시간 아침 10시 = UTC 기준 새벽 1시)
on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch: # 수동으로 버튼 눌러서 실행할 수 있게 해주는 기능

jobs:
  build:
    runs-on: ubuntu-latest # 깃허브가 빌려주는 리눅스 컴퓨터

    steps:
    - name: 내 코드 가져오기
      uses: actions/checkout@v3

    - name: 파이썬 설치하기
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 필요한 라이브러리(feedparser, requests) 설치하기
      run: |
        python -m pip install --upgrade pip
        pip install requests feedparser

    - name: 봇 실행하기!
      env:
        DISCORD_WEBHOOK: ${{ secrets.AO_DISCORD_WEBHOOK }} 
      run: python News_Bot/Day1/bot.py
